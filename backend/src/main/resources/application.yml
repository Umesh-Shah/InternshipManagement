spring:
  profiles:
    active: dev
  application:
    name: ims-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    enabled: ${MAIL_ENABLED:false}

server:
  port: 8080

# JWT HMAC-HS256 secret — must be at least 32 bytes (256 bits).
# Override via JWT_SECRET environment variable in production; never commit a real secret.
jwt:
  secret: ${JWT_SECRET:change-this-in-production-use-env-var!}
